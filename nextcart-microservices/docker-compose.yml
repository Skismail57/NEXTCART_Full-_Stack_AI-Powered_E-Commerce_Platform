version: '3.8'

services:
  mysql-auth:
    image: mysql:8.0
    container_name: nextcart-mysql-auth
    environment:
      MYSQL_DATABASE: nextcart_auth
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-product:
    image: mysql:8.0
    container_name: nextcart-mysql-product
    environment:
      MYSQL_DATABASE: nextcart_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3308:3306"
    volumes:
      - mysql-product-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-order:
    image: mysql:8.0
    container_name: nextcart-mysql-order
    environment:
      MYSQL_DATABASE: nextcart_orders
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3309:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-cms:
    image: mysql:8.0
    container_name: nextcart-mysql-cms
    environment:
      MYSQL_DATABASE: nextcart_cms
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3310:3306"
    volumes:
      - mysql-cms-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-notification:
    image: mysql:8.0
    container_name: nextcart-mysql-notification
    environment:
      MYSQL_DATABASE: nextcart_notifications
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3311:3306"
    volumes:
      - mysql-notification-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mysql-analytics:
    image: mysql:8.0
    container_name: nextcart-mysql-analytics
    environment:
      MYSQL_DATABASE: nextcart_analytics
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3312:3306"
    volumes:
      - mysql-analytics-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: nextcart-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - authentication-service
      - product-service
    environment:
      SPRING_PROFILES_ACTIVE: docker

  authentication-service:
    build: ./authentication-service
    container_name: nextcart-auth-service
    ports:
      - "8081:8081"
    depends_on:
      mysql-auth:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/nextcart_auth?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

  product-service:
    build: ./product-service
    container_name: nextcart-product-service
    ports:
      - "8082:8082"
    depends_on:
      mysql-product:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-product:3306/nextcart_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

  order-service:
    build: ./order-service
    container_name: nextcart-order-service
    ports:
      - "8083:8083"
    depends_on:
      mysql-order:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order:3306/nextcart_orders?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

  cms-service:
    build: ./cms-service
    container_name: nextcart-cms-service
    ports:
      - "8084:8084"
    depends_on:
      mysql-cms:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-cms:3306/nextcart_cms?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

  notification-service:
    build: ./notification-service
    container_name: nextcart-notification-service
    ports:
      - "8085:8085"
    depends_on:
      mysql-notification:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/nextcart_notifications?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

  analytics-service:
    build: ./analytics-service
    container_name: nextcart-analytics-service
    ports:
      - "8086:8086"
    depends_on:
      mysql-analytics:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-analytics:3306/nextcart_analytics?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mysql-auth-data:
  mysql-product-data:
  mysql-order-data:
  mysql-cms-data:
  mysql-notification-data:
  mysql-analytics-data:
