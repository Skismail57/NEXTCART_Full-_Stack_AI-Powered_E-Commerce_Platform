spring:
  application:
    name: authentication-service
  datasource:
    url: jdbc:mysql://localhost:3306/nextcart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: myVerySecretKeyForJwtTokenGenerationThatShouldBeAtLeast256BitsLongForSecurity
  expiration: 86400000

server:
  port: 8081
