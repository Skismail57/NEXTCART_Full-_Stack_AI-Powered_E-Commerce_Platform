
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: authentication-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/brands/**,/api/inventory/**,/api/home/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**,/api/wishlist/**,/api/orders/**,/api/coupons/**
        - id: cms-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/hero-banners/**,/api/homepage-sections/**,/api/menu-items/**,/api/announcement-bars/**,/api/system-settings/**,/api/banners/**,/api/cms-pages/**,/api/popups/**,/api/testimonials/**
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
        - id: analytics-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/analytics/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret: your-secret-key-make-it-very-long-and-secure-at-least-256-bits
  expiration: 86400000
