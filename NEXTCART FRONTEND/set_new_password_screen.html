<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set New Password - NEXCART</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2a20d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#12100e",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(39, 35, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(242, 162, 13, 0.2);
        }
        .lamp-glow {
            filter: drop-shadow(0 0 15px rgba(242, 162, 13, 0.4));
        }
        .warm-cone {
            background: radial-gradient(circle at top, rgba(242, 162, 13, 0.15) 0%, rgba(18, 16, 14, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between z-50 relative">
<div class="text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="arrow_back_ios">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Reset Password</h2>
</div>
<!-- Lamp & Cord Visual Section -->
<div class="relative w-full flex flex-col items-center pt-4">
<!-- Interactive Lamp Fixture -->
<div class="relative z-20 flex flex-col items-center">
<!-- Lamp Top -->
<div class="w-32 h-16 bg-[#27231b] rounded-t-full border-t border-primary/30 lamp-glow flex items-center justify-center relative">
<div class="absolute -bottom-1 w-24 h-4 bg-primary/20 blur-md"></div>
</div>
<!-- Pull Cord Handle -->
<div class="flex flex-col items-center mt-[-4px]">
<div class="w-1 h-32 bg-gradient-to-b from-[#27231b] to-primary/60"></div>
<div class="w-6 h-6 rounded-full bg-primary border-4 border-[#27231b] shadow-[0_0_10px_rgba(242,162,13,0.5)] cursor-pointer"></div>
</div>
</div>
<!-- Light Cone Effect -->
<div class="absolute top-20 left-0 w-full h-[600px] warm-cone z-10 pointer-events-none"></div>
<!-- Headline Content -->
<div class="relative z-20 mt-4 text-center px-6">
<h2 class="text-white tracking-light text-[28px] font-bold leading-tight pb-2">Secure Your Account</h2>
<p class="text-white/70 text-base font-normal leading-normal pb-6">Enter a strong password to protect your NEXCART profile.</p>
</div>
<!-- Glassmorphism Form Card -->
<div class="relative z-20 w-full max-w-[400px] px-4 pb-12">
<div class="glass-card p-6 rounded-xl flex flex-col gap-6">
<!-- New Password Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white/90 text-sm font-medium leading-normal pb-2 ml-1">New Password</p>
<div class="flex w-full items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 rounded-l-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-white/5 focus:border-primary h-14 placeholder:text-white/30 p-[15px] pr-2 text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
<div class="text-white/60 flex border border-white/10 bg-white/5 items-center justify-center pr-[15px] rounded-r-lg border-l-0 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<!-- Password Strength (Mini Indicator) -->
<div class="flex gap-1 px-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary/20 rounded-full"></div>
<div class="h-1 flex-1 bg-primary/20 rounded-full"></div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-white/90 text-sm font-medium leading-normal pb-2 ml-1">Confirm New Password</p>
<div class="flex w-full items-stretch">
<input class="form-input flex w-full min-w-0 flex-1 rounded-l-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-white/5 focus:border-primary h-14 placeholder:text-white/30 p-[15px] pr-2 text-base font-normal leading-normal" placeholder="••••••••" type="password" value=""/>
<div class="text-white/60 flex border border-white/10 bg-white/5 items-center justify-center pr-[15px] rounded-r-lg border-l-0 cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<!-- Call to Action Button -->
<div class="pt-2">
<button class="w-full h-14 bg-primary text-[#12100e] font-bold text-lg rounded-xl shadow-[0_4px_20px_rgba(242,162,13,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Update Password
                        <span class="material-symbols-outlined font-bold">lock_open</span>
</button>
</div>
<!-- Quick Help / Support -->
<p class="text-center text-white/40 text-xs font-medium">
                    Need help? <a class="text-primary hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed bottom-0 left-0 w-full pointer-events-none opacity-40">
<div class="w-full h-32 bg-gradient-to-t from-primary/10 to-transparent"></div>
</div>
<!-- Background Artwork / Placeholders -->
<div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[100px]" data-alt="Abstract golden glow pattern"></div>
</div>
</body></html>
