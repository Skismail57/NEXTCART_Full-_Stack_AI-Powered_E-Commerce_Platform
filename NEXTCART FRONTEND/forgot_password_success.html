<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NEXCART - Forgot Password Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .lamp-glow {
            background: radial-gradient(circle, rgba(19, 236, 91, 0.15) 0%, rgba(19, 236, 91, 0) 70%);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(19, 236, 91, 0.5);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(19, 236, 91, 0.6));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Interactive Lamp Section (Top) -->
<div class="relative w-full h-48 flex flex-col items-center justify-start">
<!-- Lamp Wire -->
<div class="w-0.5 h-16 bg-gradient-to-b from-gray-800 to-primary/40"></div>
<!-- The Lamp Head -->
<div class="relative">
<div class="w-12 h-6 bg-zinc-800 rounded-t-full border-t border-primary/20"></div>
<!-- Lamp Glow Effect -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 w-64 h-64 lamp-glow rounded-full pointer-events-none"></div>
<!-- Actual Light Source -->
<div class="absolute top-5 left-1/2 -translate-x-1/2 w-4 h-1 bg-primary blur-sm"></div>
</div>
</div>
<!-- Main Content Container -->
<div class="w-full max-w-md px-6 -mt-10 z-10 flex flex-col items-center">
<!-- Glassmorphism Card -->
<div class="glass-card w-full rounded-xl p-8 flex flex-col items-center">
<!-- Glowing Success Icon -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<div class="relative size-20 rounded-full border border-primary/30 flex items-center justify-center bg-primary/10">
<span class="material-symbols-outlined text-primary text-5xl icon-glow">
                        send
                    </span>
</div>
</div>
<!-- Header Text -->
<h2 class="text-white text-3xl font-bold leading-tight tracking-tight text-center mb-4 font-display glow-text">
                Reset Link Sent!
            </h2>
<!-- Body Text -->
<p class="text-zinc-400 text-base font-normal leading-relaxed text-center mb-10 px-2">
                Check your email to proceed. We've sent a secure password recovery link to your registered address.
            </p>
<!-- Primary Action Button -->
<div class="w-full flex flex-col gap-4">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg rounded-lg transition-all duration-300 flex items-center justify-center shadow-lg shadow-primary/20">
<span>Back to Login</span>
</button>
<!-- Secondary Resend Link -->
<button class="w-full py-3 text-zinc-400 hover:text-primary transition-colors duration-200 text-sm font-medium flex items-center justify-center gap-2">
                    Didn't receive the email? 
                    <span class="text-primary font-bold">Resend Link</span>
</button>
</div>
</div>
<!-- App Branding/Footer -->
<div class="mt-12 flex flex-col items-center opacity-40">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-white text-xl">shopping_cart</span>
<span class="text-white font-bold tracking-[0.2em] text-sm">NEXCART</span>
</div>
<p class="text-[10px] text-zinc-500 uppercase tracking-widest">Premium Shopping Experience</p>
</div>
</div>
<!-- iOS Indicator Bar (Visual Only) -->
<div class="mt-auto pb-4 w-full flex justify-center">
<div class="w-32 h-1 bg-zinc-800 rounded-full"></div>
</div>
</body></html>
